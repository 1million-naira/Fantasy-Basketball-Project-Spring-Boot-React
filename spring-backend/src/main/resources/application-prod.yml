logging:
  level:
    org:
      hibernate:
        SQL: debug
security:
  jwt:
    secret-key: ${JWT_KEY}
spring:
  application:
    name: NewTopSquadProject
  datasource:
    password: ${DB_PASSWORD}
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true